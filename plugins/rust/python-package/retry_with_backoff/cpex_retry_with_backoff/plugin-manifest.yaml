description: "Rust-backed retry and backoff policy plugin for tool results"
author: "ContextForge Contributors"
version: "0.1.0"
available_hooks:
  - "tool_post_invoke"
  - "resource_post_fetch"
default_configs:
  max_retries: 2
  backoff_base_ms: 200
  max_backoff_ms: 5000
  retry_on_status: [429, 500, 502, 503, 504]
  jitter: true
  check_text_content: false
  tool_overrides: {}
