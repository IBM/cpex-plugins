name: CI Install Built Wheel

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "plugins/rust/python-package/**"
      - "tests/test_install_built_wheel.py"
      - ".github/workflows/ci-install-built-wheel.yaml"
      - ".github/workflows/release-rust-python-package.yaml"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "plugins/rust/python-package/**"
      - "tests/test_install_built_wheel.py"
      - ".github/workflows/ci-install-built-wheel.yaml"
      - ".github/workflows/release-rust-python-package.yaml"

concurrency:
  group: ci-install-built-wheel-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run install-built-wheel tests
        run: python3 -m unittest tests/test_install_built_wheel.py
