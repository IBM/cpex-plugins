name: CI Rust Python Package Plugins

on:
  push:
    branches: [main]
    paths:
      - "Makefile"
      - "Cargo.toml"
      - "crates/**"
      - "README.md"
      - "DEVELOPING.md"
      - "TESTING.md"
      - "plugins/rust/python-package/**"
      - "plugins/tests/**"
      - "tools/**"
      - ".github/workflows/ci-rust-python-package.yaml"
      - ".github/workflows/release-rust-python-package.yaml"
  pull_request:
    branches: [main]
    paths:
      - "Makefile"
      - "Cargo.toml"
      - "crates/**"
      - "README.md"
      - "DEVELOPING.md"
      - "TESTING.md"
      - "plugins/rust/python-package/**"
      - "plugins/tests/**"
      - "tools/**"
      - ".github/workflows/ci-rust-python-package.yaml"
      - ".github/workflows/release-rust-python-package.yaml"
  workflow_dispatch:

concurrency:
  group: ci-rust-python-package-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-and-detect:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
      has_plugins: ${{ steps.detect.outputs.has_plugins }}
      plugin_count: ${{ steps.detect.outputs.plugin_count }}
      single_cargo_package: ${{ steps.detect.outputs.single_cargo_package }}
      cargo_packages: ${{ steps.detect.outputs.cargo_packages }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            selection="$(python3 tools/plugin_catalog.py ci-selection . diff "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            selection="$(python3 tools/plugin_catalog.py ci-selection . all '' '')"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            selection="$(python3 tools/plugin_catalog.py ci-selection . all '' '')"
          else
            selection="$(python3 tools/plugin_catalog.py ci-selection . diff "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          plugins="$(printf '%s' "${selection}" | python3 -c 'import json, sys; print(json.dumps(json.load(sys.stdin)["plugins"]))')"
          has_plugins="$(printf '%s' "${selection}" | python3 -c 'import json, sys; print(str(json.load(sys.stdin)["has_plugins"]).lower())')"
          plugin_count="$(printf '%s' "${selection}" | python3 -c 'import json, sys; print(len(json.load(sys.stdin)["plugins"]))')"
          single_cargo_package="$(printf '%s' "${selection}" | python3 -c 'import json, sys; print(json.load(sys.stdin)["single_cargo_package"])')"
          cargo_packages="$(printf '%s' "${selection}" | python3 -c 'import json, sys; print(json.dumps(json.load(sys.stdin)["cargo_packages"]))')"
          echo "plugins=${plugins}" >> "$GITHUB_OUTPUT"
          echo "plugin_count=${plugin_count}" >> "$GITHUB_OUTPUT"
          echo "single_cargo_package=${single_cargo_package}" >> "$GITHUB_OUTPUT"
          echo "cargo_packages=${cargo_packages}" >> "$GITHUB_OUTPUT"
          if [[ "${has_plugins}" == "false" ]]; then
            echo "has_plugins=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_plugins=true" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    needs: validate-and-detect
    if: needs.validate-and-detect.outputs.has_plugins == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        plugin: ${{ fromJson(needs.validate-and-detect.outputs.plugins) }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install uv
        run: python -m pip install uv==0.9.30 maturin==1.12.6

      - name: Sync plugin environment
        working-directory: plugins/rust/python-package/${{ matrix.plugin }}
        run: make sync

      - name: Plugin CI verification
        working-directory: plugins/rust/python-package/${{ matrix.plugin }}
        run: make ci

  security-policy:
    needs: validate-and-detect
    if: needs.validate-and-detect.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install cargo deny
        run: cargo install cargo-deny@0.19.0 --locked

      - name: Run cargo deny
        run: |
          # pyo3-stub-gen still pulls rustpython-parser's unmaintained unic-* parser dependencies.
          cargo deny check --config deny.toml -A unmaintained

  coverage:
    needs: validate-and-detect
    if: needs.validate-and-detect.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Rust coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --version 0.8.4 --locked

      - name: Generate Rust coverage report
        run: |
          mkdir -p coverage
          mapfile -t cargo_packages < <(python3 -c 'import json, sys; [print(package) for package in json.loads(sys.argv[1])]' '${{ needs.validate-and-detect.outputs.cargo_packages }}')
          cargo_args=()
          for package in "${cargo_packages[@]}"; do
            cargo_args+=("-p" "${package}")
          done
          cargo llvm-cov "${cargo_args[@]}" --cobertura --output-path coverage/cobertura.xml

      - name: Enforce per-plugin coverage floor
        run: python3 tools/plugin_catalog.py coverage-check . coverage/cobertura.xml 50.00 '${{ needs.validate-and-detect.outputs.plugins }}'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          files: ./coverage/cobertura.xml
          flags: rust-python-package-workspace
          name: rust-python-package-workspace-coverage

  documentation:
    needs: validate-and-detect
    if: needs.validate-and-detect.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build Rust documentation
        run: |
          mapfile -t cargo_packages < <(python3 -c 'import json, sys; [print(package) for package in json.loads(sys.argv[1])]' '${{ needs.validate-and-detect.outputs.cargo_packages }}')
          for package in "${cargo_packages[@]}"; do
            cargo doc -p "${package}" --lib --no-deps --document-private-items
          done

  release-validation:
    if: github.event_name == 'pull_request'
    needs: validate-and-detect
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/release-rust-python-package.yaml
    with:
      tag: retry-with-backoff-v0.1.1
      repository: testpypi
      publish_enabled: false
